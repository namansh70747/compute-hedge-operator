apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chp.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chp.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chp.name" . }}
  labels:
    {{- include "chp.labels" . | nindent 4 }}
rules:
  - apiGroups: ["computehedge.dev"]
    resources: ["computepositions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["computehedge.dev"]
    resources: ["computepositions/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chp.name" . }}
  labels:
    {{- include "chp.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chp.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "chp.name" . }}
    namespace: {{ .Release.Namespace }}
