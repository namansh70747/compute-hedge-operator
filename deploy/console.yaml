apiVersion: v1
kind: ServiceAccount
metadata:
  name: compute-hedge-console
  namespace: compute-hedge-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: compute-hedge-console
rules:
  # Read-only: the console never mutates cluster state.
  - apiGroups: ["computehedge.dev"]
    resources: ["computepositions", "computepositions/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compute-hedge-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: compute-hedge-console
subjects:
  - kind: ServiceAccount
    name: compute-hedge-console
    namespace: compute-hedge-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: compute-hedge-system
  labels:
    app: console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      serviceAccountName: compute-hedge-console
      securityContext:
        runAsNonRoot: true
      containers:
        - name: console
          image: compute-hedge-operator:dev
          imagePullPolicy: IfNotPresent
          command: ["/console"]
          env:
            - name: LISTEN_ADDR
              value: ":8090"
            # auto = show LIVE provenance when Ornn credentials are present, else SIMULATED.
            - name: OCPI_MODE
              value: "auto"
            - name: TELEMETRY_MODE
              value: "auto"
            - name: MARKET_MODE
              value: "auto"
            - name: OCPI_URL
              value: "http://mockocpi:8080"
            - name: CLUSTER_NAME
              value: "kind-compute-hedge"
            - name: POLL_INTERVAL
              value: "2s"
          # Same optional secret as the operator: present => the console badge flips LIVE.
          envFrom:
            - secretRef:
                name: ornn-credentials
                optional: true
          ports:
            - name: http
              containerPort: 8090
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: compute-hedge-system
  labels:
    app: console
spec:
  selector:
    app: console
  ports:
    - name: http
      port: 8090
      targetPort: http
