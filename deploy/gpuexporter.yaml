apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpuexporter
  namespace: compute-hedge-system
  labels:
    app: gpuexporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpuexporter
  template:
    metadata:
      labels:
        app: gpuexporter
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: gpuexporter
          image: compute-hedge-operator:dev
          imagePullPolicy: IfNotPresent
          command: ["/gpuexporter"]
          env:
            - name: LISTEN_ADDR
              value: ":8081"
            - name: TICK_INTERVAL
              value: "3s"
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: gpuexporter
  namespace: compute-hedge-system
  labels:
    app: gpuexporter
spec:
  selector:
    app: gpuexporter
  ports:
    - name: http
      port: 8081
      targetPort: http
