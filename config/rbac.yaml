apiVersion: v1
kind: ServiceAccount
metadata:
  name: compute-hedge-operator
  namespace: compute-hedge-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: compute-hedge-operator
rules:
  - apiGroups: ["computehedge.dev"]
    resources: ["computepositions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["computehedge.dev"]
    resources: ["computepositions/status"]
    verbs: ["get", "update", "patch"]
  # Least-privilege: only get/list/watch/update/patch Deployments, and only for the
  # optional, opt-in pause/resume action. No create or delete.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compute-hedge-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: compute-hedge-operator
subjects:
  - kind: ServiceAccount
    name: compute-hedge-operator
    namespace: compute-hedge-system
