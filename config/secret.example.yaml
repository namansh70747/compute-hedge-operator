# Ornn credentials for in-cluster live mode.
#
# The operator and console both mount this Secret via `envFrom ... optional: true`.
# Absent  -> everything stays on the bundled simulator (SIMULATED DATA).
# Present -> each source with credentials auto-switches to live (badge flips to LIVE).
#
# Quickest path is `make live` (builds this from your .env). To apply by hand:
#   cp config/secret.example.yaml config/secret.yaml   # fill in real values
#   kubectl apply -f config/secret.yaml
#   kubectl -n compute-hedge-system rollout restart deploy/compute-hedge-operator deploy/console
#
# config/secret.yaml is gitignored so real tokens never get committed.
apiVersion: v1
kind: Secret
metadata:
  name: ornn-credentials
  namespace: compute-hedge-system
type: Opaque
stringData:
  # --- Price feed ---
  ORNN_API_TOKEN: "replace-with-real-token"
  ORNN_API_BASE_URL: "https://api.ornnai.com"
  ORNN_API_PRICE_PATH: "/v1/prices"

  # --- Telemetry (real DCGM via Prometheus) ---
  PROMETHEUS_URL: "http://prometheus.compute-hedge-system.svc:9090"
  TELEMETRY_QUERY: 'avg(DCGM_FI_DEV_GPU_UTIL{position="{position}"})'

  # --- Marketplace write-back (optional, off by default) ---
  MARKET_API_URL: ""
  MARKET_API_PATH: "/v1/marketplace/supply"
  MARKET_WRITE_ENABLED: "false"

  # --- Shared auth ---
  AUTH_SCHEME: "Bearer"
  AUTH_HEADER: "Authorization"
